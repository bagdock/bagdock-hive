name: Auto Release & Publish

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write
  id-token: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.pkg.outputs.version }}" \
            --target main \
            --title "${{ steps.pkg.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.exists == 'false'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: 22
      - run: bun install
        if: steps.check.outputs.exists == 'false'
      - run: bunx tsup src/index.ts --format cjs,esm --dts --clean
        if: steps.check.outputs.exists == 'false'
      - run: npx npm@latest publish --provenance --access public
        if: steps.check.outputs.exists == 'false'
